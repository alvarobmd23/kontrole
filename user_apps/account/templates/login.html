{% extends 'base.html' %}

{% block title %}Login{% endblock title %}

{% block body %}
  <h1>Login</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <br/>
    <button type="submit" class="btn btn-primary">Login</button>
  </form>

  <a href="{% url 'accounts:signup' %}">SignUp</a>
{% endblock body %}
