{% extends 'profbase.html' %}
{% load bootstrap %}

{% block title %}Kontrole{% endblock title %}

{% block body %}

        <h1>Tipo de Documento - {{ document_type.document_type }} </h1>

        </form>
    </div>
{% endblock body %}
